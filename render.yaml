services:
  - type: web
    name: flatshare-ledger-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
